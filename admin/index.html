<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="../libs/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <link href="./css/main.css" rel="stylesheet">

    <title>Admin</title>
</head>

<body>


    <div class="container py-5">

        <h1 class="mb-4">
            Категорії
        </h1>

        <form id="category-form" class="card p-4 mb-4">

            <div class="mb-3">
                <label class="form-label">
                    Назва
                </label>

                <input type="text" id="category-name" class="form-control" placeholder="Браслети">
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Value
                </label>

                <input type="text" id="category-value" class="form-control" placeholder="bracelets">
            </div>

            <div class="form-check mb-3">

                <input type="checkbox" class="form-check-input" id="category-publish">

                <label class="form-check-label">
                    Published
                </label>

            </div>

            <button class="btn btn-dark">
                Додати категорію
            </button>

        </form>

        <ul id="categories-list" class="list-group"></ul>

    </div>


    <script src="../libs/bootstrap/bootstrap.bundle.js"></script>
    <script src="../js/main.js" type="module"></script>
    <script src="./js/main.js" type="module"></script>
</body>

</html>
